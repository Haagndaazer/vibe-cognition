<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Vibe Cognition Dashboard</title>
  <link rel="stylesheet" href="/static/styles.css" />
  <!-- Vendored (WP-D4 / audit D-4): self-hosted, not CDN — no SRI gap (a CDN
       compromise could run arbitrary JS in a page that can DELETE nodes) and the
       dashboard works offline. Pinned: cytoscape@3.30.2, layout-base@2.0.1,
       cose-base@2.2.0, cytoscape-fcose@2.2.0. -->
  <script src="/static/vendor/cytoscape.min.js"></script>
  <script src="/static/vendor/layout-base.js"></script>
  <script src="/static/vendor/cose-base.js"></script>
  <script src="/static/vendor/cytoscape-fcose.js"></script>
</head>
<body>
  <header>
    <div id="brand">vibe-cognition</div>
    <div id="search-wrap">
      <input id="search" type="text" placeholder="Search nodes (loading embedding model...)" disabled autocomplete="off" />
      <div id="search-results" hidden></div>
    </div>
    <div id="status-line">
      <button id="refresh-btn" type="button" title="Reload the graph">↻ Refresh</button>
      <span id="stats"></span>
      <span id="banner" class="banner-loading">Loading embedding model…</span>
    </div>
  </header>

  <main>
    <aside id="episodes-panel">
      <div class="panel-header">Episodes <span id="episode-count" class="muted"></span></div>
      <ul id="episode-list"></ul>
      <div class="panel-header">Documents <span id="document-count" class="muted"></span></div>
      <ul id="document-list"></ul>
    </aside>
    <div id="cy"></div>
    <aside id="detail">
      <div class="detail-empty">Click a node to see details</div>
    </aside>
  </main>

  <div id="toasts"></div>

  <template id="detail-tpl">
    <div class="detail">
      <div class="detail-header">
        <span class="detail-type"></span>
        <span class="detail-id"></span>
      </div>
      <h2 class="detail-summary"></h2>
      <pre class="detail-body"></pre>
      <div class="detail-meta"></div>
      <div class="detail-section">
        <h3>References</h3>
        <ul class="detail-references"></ul>
      </div>
      <div class="detail-section">
        <h3>Outgoing edges</h3>
        <ul class="detail-successors"></ul>
      </div>
      <div class="detail-section">
        <h3>Incoming edges</h3>
        <ul class="detail-predecessors"></ul>
      </div>
      <button class="detail-delete">Delete node</button>
    </div>
  </template>

  <script src="/static/app.js"></script>
</body>
</html>
