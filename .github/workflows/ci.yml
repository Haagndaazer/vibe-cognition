name: CI

# Runs on every PR and on push to main (acceptance criterion a).
#
# Journal handling: Vince's cognition-journal flushes land on main as direct
# pushes (not PRs), and WP branches never commit the journal — so a journal-only
# *PR* cannot occur under our protocol. We therefore path-ignore the journal on
# `push` only (so a flush doesn't burn a full suite run) and leave `pull_request`
# unfiltered. This avoids the required-check deadlock entirely: a path-filtered
# PR that skips a required check would sit "pending" forever, but PRs here always
# carry code, so the check always runs and reports. No skip/fallback job needed.
on:
  push:
    branches: [main]
    paths-ignore:
      - '.cognition/journal.jsonl'
  pull_request:

# Least privilege. The repo default is read-only today, but pinning it here keeps
# a future org/settings change from silently widening what CI can do.
permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  # Cancel superseded runs on PRs only. On main a run may be the very one whose
  # SHA gets pinned for release; cancelling it (e.g. two pushes within a minute)
  # could leave an unverified SHA pinned.
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  test:
    name: test
    strategy:
      fail-fast: false
      matrix:
        # Pin interpreters explicitly — don't rely on the runner image's default.
        # The 3.11 floor on both OSes, plus the 3.13 ceiling on ubuntu. Legs run
        # in parallel, so wall-clock stays ~= the slowest single leg.
        include:
          - os: ubuntu-latest
            python: "3.11"
          - os: windows-latest
            python: "3.11"
          - os: ubuntu-latest
            python: "3.13"
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        # Pinned to an exact release: there is no floating `v8` major tag, and
        # this is the latest (runs on Node 24, off the deprecated Node 20).
        uses: astral-sh/setup-uv@v8.2.0
        with:
          # Pin uv itself — unpinned latest-at-runtime is resolution-drift surface.
          version: "0.9.27"
          enable-cache: true

      # Installs from the committed lock (CPU-only torch, no CUDA stack).
      # --locked fails if pyproject and uv.lock have drifted apart.
      # --python pins the interpreter explicitly for this matrix leg.
      - name: Sync dependencies
        run: uv sync --locked --python ${{ matrix.python }}

      # The release procedure requires bumping pyproject.toml and plugin.json
      # together by hand (CLAUDE.md's Plugin Release Procedure) — nothing else
      # asserts they stayed in sync, so a forgotten bump ships a plugin whose
      # displayed version misrepresents the pinned code.
      - name: version match (pyproject.toml <-> plugin.json)
        run: uv run python .github/scripts/check_version_match.py

      - name: ruff
        run: uv run ruff check .

      # pyright runs against a committed baseline count; fails only if NEW errors
      # push the count above the baseline. Lower the baseline in the same PR that
      # reduces errors (monotonic ratchet to zero).
      # NB: editing .github/pyright-baseline.txt requires manager sign-off — the
      # ratchet cannot guard a silent raise; the diff review is that guard.
      - name: pyright (baseline ratchet)
        run: uv run python .github/scripts/pyright_ratchet.py

      - name: pytest
        run: uv run pytest -q
